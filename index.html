<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PPY</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="verification-screen" class="screen is-active" aria-label="照合">
        <header class="topbar">
          <div>
            <div class="brand">
              <img src="./ppy-icon.png" alt="" width="44" height="44">
              <h1>PPY</h1>
            </div>
            <nav class="mode-tabs" aria-label="照合モード">
              <button class="mode-button" type="button" data-mode="one-to-one">1対1</button>
              <button class="mode-button" type="button" data-mode="one-to-many">1対多</button>
            </nav>
          </div>

          <div class="status-cluster">
            <output id="match-count" class="match-count">0件</output>
            <button id="open-settings" class="icon-button" type="button" aria-label="機能設定">⚙</button>
            <output id="result-symbol" class="result-symbol pending">-</output>
          </div>
        </header>

        <p id="mode-message" class="message">照合モードを選択してください</p>
        <p id="log-message" class="message error" hidden>ログ保存に失敗しました。照合は継続しています。</p>

        <form id="verification-form" class="verification-form" autocomplete="off">
          <label class="field">
            <span>マスターデータ入力</span>
            <input id="master-input" type="text" inputmode="text" disabled>
          </label>

          <label class="field">
            <span>スレーブデータ入力</span>
            <input id="slave-input" type="text" inputmode="text" disabled>
          </label>

          <div class="button-row">
            <button id="clear-button" class="primary-button" type="button">クリア</button>
            <button id="retry-button" class="primary-button" type="button">再入力</button>
          </div>
        </form>
      </section>

      <section id="settings-screen" class="screen settings-screen" aria-label="機能設定">
        <header class="settings-header">
          <button id="back-button" class="icon-button" type="button" aria-label="戻る">‹</button>
          <h2>機能設定</h2>
        </header>

        <section class="settings-group">
          <h3>照合設定</h3>
          <div class="settings-panel comparison-grid">
            <label class="field compact">
              <span>マスター開始位置</span>
              <input id="master-start" type="text" inputmode="numeric" value="1">
            </label>
            <label class="field compact">
              <span>スレーブ開始位置</span>
              <input id="slave-start" type="text" inputmode="numeric" value="1">
            </label>
            <label class="field compact">
              <span>照合桁数</span>
              <input id="comparison-digits" type="text" inputmode="numeric" value="0">
            </label>
          </div>
        </section>

        <section class="settings-group">
          <h3>操作設定</h3>
          <div class="settings-panel action-line">
            <div>
              <span class="label-text">照合件数</span>
              <output id="settings-match-count">0件</output>
            </div>
            <button id="clear-count-button" class="primary-button narrow" type="button">照合件数クリア</button>
          </div>
        </section>

        <section class="settings-group">
          <h3>ログファイル設定</h3>
          <div class="settings-panel log-panel">
            <label class="field compact">
              <span>ログファイル名</span>
              <input id="log-file-name" type="text" value="PPY000000">
            </label>
            <div class="button-row end">
              <button id="download-log-button" class="secondary-button" type="button">ログ保存</button>
              <button id="delete-log-button" class="primary-button narrow" type="button">ログファイル消去</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <dialog id="confirm-dialog" class="confirm-dialog">
      <form method="dialog">
        <h2 id="dialog-title">確認</h2>
        <p id="dialog-message"></p>
        <div class="dialog-actions">
          <button id="dialog-cancel" class="secondary-button" value="cancel">キャンセル</button>
          <button id="dialog-ok" class="primary-button narrow" value="ok">OK</button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
