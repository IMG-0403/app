<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PicScan</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
            background: #f4f6f8;
            color: #17212b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
        }

        .appShell {
            width: min(1040px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .topBar {
            margin-bottom: 24px;
        }

        .label {
            margin: 0 0 6px;
            color: #5b6b7b;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0;
        }

        h1,
        h2 {
            margin: 0;
            letter-spacing: 0;
        }

        h1 {
            font-size: 2rem;
        }

        h2 {
            font-size: 1.25rem;
            line-height: 1.35;
        }

        .searchPanel,
        .result,
        .emptyState {
            background: #ffffff;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            box-shadow: 0 16px 38px rgba(32, 43, 54, 0.08);
        }

        .searchPanel {
            padding: 18px;
            margin-bottom: 18px;
        }

        .searchPanel label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .searchRow {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 112px;
            gap: 10px;
        }

        input,
        button {
            min-height: 44px;
            border-radius: 6px;
            font: inherit;
        }

        input {
            width: 100%;
            border: 1px solid #c7d1db;
            padding: 0 13px;
            background: #fbfcfd;
        }

        input:focus {
            border-color: #2274a5;
            box-shadow: 0 0 0 3px rgba(34, 116, 165, 0.18);
            outline: none;
        }

        button {
            border: 0;
            background: #2274a5;
            color: #ffffff;
            cursor: pointer;
            font-weight: 700;
        }

        button:hover {
            background: #185a82;
        }

        .result {
            display: none;
            overflow: hidden;
        }

        .result.isVisible {
            display: block;
        }

        .resultHeader {
            padding: 18px;
            border-bottom: 1px solid #dce3ea;
        }

        .resultTitleRow {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px 14px;
        }

        .imageGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
            padding: 18px;
        }

        .imageItem {
            overflow: hidden;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            background: #ffffff;
        }

        .imageFrame {
            display: grid;
            place-items: center;
            min-height: 420px;
            padding: 20px;
            background:
                linear-gradient(45deg, #eef2f6 25%, transparent 25%),
                linear-gradient(-45deg, #eef2f6 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #eef2f6 75%),
                linear-gradient(-45deg, transparent 75%, #eef2f6 75%);
            background-color: #ffffff;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0;
            background-size: 20px 20px;
        }

        .imageItem .imageFrame {
            min-height: 220px;
            padding: 12px;
        }

        .imageFrame img {
            display: block;
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }

        .imageComment {
            margin: 0;
            padding: 12px 14px;
            color: #334455;
            line-height: 1.55;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .imageComment:empty {
            display: none;
        }

        .emptyState {
            padding: 42px 24px;
            text-align: center;
        }

        .emptyState.isHidden {
            display: none;
        }

        .emptyState p:last-child {
            margin: 10px 0 0;
            color: #5b6b7b;
        }

        .searchedModel {
            margin: 0 0 10px;
            color: #334455;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .searchedModel:empty {
            display: none;
        }

        code {
            padding: 2px 5px;
            border-radius: 4px;
            background: #eef2f6;
        }

        @media (max-width: 640px) {
            .appShell {
                width: min(100% - 20px, 1040px);
                padding-top: 18px;
            }

            .searchRow {
                grid-template-columns: 1fr;
            }

            .imageFrame {
                min-height: 300px;
                padding: 12px;
            }

            .imageGrid {
                grid-template-columns: 1fr;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <main class="appShell">
        <header class="topBar">
            <p class="label">画像検索</p>
            <h1>PicScan</h1>
        </header>

        <form class="searchPanel" id="searchForm">
            <label for="model">型番または4桁登録番号を入力してください</label>
            <div class="searchRow">
                <input id="model" name="model" placeholder="例: ABC-123 / 1234" autocomplete="off" autofocus>
                <button type="submit">検索</button>
            </div>
        </form>

        <section class="result" id="result">
            <div class="resultHeader">
                <div>
                    <p class="label">検索結果</p>
                    <h2 id="resultTitle"></h2>
                </div>
            </div>
            <div class="imageGrid" id="imageGrid"></div>
        </section>

        <section class="emptyState isHidden" id="message">
            <p class="label">PicScan</p>
            <p class="searchedModel" id="messageModel"></p>
            <h2 id="messageTitle"></h2>
            <p id="messageText"></p>
        </section>
    </main>

    <script>
        const form = document.getElementById("searchForm");
        const modelInput = document.getElementById("model");
        const result = document.getElementById("result");
        const resultTitle = document.getElementById("resultTitle");
        const imageGrid = document.getElementById("imageGrid");
        const message = document.getElementById("message");
        const messageModel = document.getElementById("messageModel");
        const messageTitle = document.getElementById("messageTitle");
        const messageText = document.getElementById("messageText");
        const extensions = ["", ".jpg", ".jpeg", ".png", ".webp", ".gif", ".bmp", ".svg"];

        function encodePathSegment(value) {
            return value.split("/").map(encodeURIComponent).join("/");
        }

        function buildCandidates(modelNo) {
            const hasExtension = /\.[a-z0-9]+$/i.test(modelNo);
            const targets = hasExtension ? [modelNo] : extensions.map((extension) => `${modelNo}${extension}`);
            return [...new Set(targets)].map((target) => ({
                name: target,
                url: `images/${encodePathSegment(target)}`
            }));
        }

        async function loadComments() {
            try {
                const response = await fetch(`comments.json?v=${Date.now()}`);
                if (!response.ok) {
                    return {};
                }
                const body = await response.json();
                return body && typeof body === "object" ? body : {};
            } catch (error) {
                return {};
            }
        }

        async function loadCatalog() {
            try {
                const response = await fetch(`catalog.json?v=${Date.now()}`);
                if (!response.ok) {
                    return [];
                }
                const body = await response.json();
                return normalizeCatalog(body);
            } catch (error) {
                return [];
            }
        }

        function normalizeCatalog(catalog) {
            const source = Array.isArray(catalog)
                ? catalog
                : Array.isArray(catalog?.records)
                    ? catalog.records
                    : [];
            return source
                .map((record) => ({
                    name: String(record?.name || "").trim(),
                    numbers: Array.isArray(record?.numbers)
                        ? record.numbers.map((number) => String(number).trim()).filter(Boolean)
                        : [],
                    images: Array.isArray(record?.images)
                        ? record.images.slice(0, 6).map((image) => ({
                            file: String(image?.file || image?.name || "").trim(),
                            comment: typeof image?.comment === "string" ? image.comment : ""
                        })).filter((image) => image.file)
                        : []
                }))
                .filter((record) => record.name && record.images.length);
        }

        function readComment(comments, fileName) {
            const value = comments[`images/${fileName}`] ?? comments[fileName] ?? "";
            if (typeof value === "string") {
                return value;
            }
            return value && typeof value.comment === "string" ? value.comment : "";
        }

        function showMessage(title, text, searchedModel = "") {
            result.classList.remove("isVisible");
            message.classList.remove("isHidden");
            messageModel.textContent = searchedModel ? `入力値: ${searchedModel}` : "";
            messageTitle.textContent = title;
            messageText.textContent = text;
        }

        function imageUrl(fileName) {
            return `images/${encodePathSegment(fileName)}`;
        }

        function showRecord(record, comments, searchedModel = "") {
            const numberText = record.numbers.length ? ` (${record.numbers.join(", ")})` : "";
            resultTitle.textContent = `${record.name}${numberText}`;
            imageGrid.textContent = "";
            record.images.slice(0, 6).forEach((image) => {
                const item = document.createElement("article");
                item.className = "imageItem";

                const frame = document.createElement("div");
                frame.className = "imageFrame";

                const img = document.createElement("img");
                img.alt = `${record.name} ${image.file}`;
                img.src = imageUrl(image.file);

                const comment = document.createElement("p");
                comment.className = "imageComment";
                comment.textContent = image.comment || readComment(comments, image.file);

                frame.appendChild(img);
                item.appendChild(frame);
                item.appendChild(comment);
                imageGrid.appendChild(item);
            });
            message.classList.add("isHidden");
            result.classList.add("isVisible");
            modelInput.value = "";
        }

        function findRecord(catalog, query) {
            const normalized = query.trim().toLowerCase();
            return catalog.find((record) => record.name.toLowerCase() === normalized)
                || catalog.find((record) => record.numbers.some((number) => number === query.trim()));
        }

        function showLegacyImage(candidate, comments) {
            showRecord({
                name: candidate.name.replace(/\.[^.]+$/, ""),
                numbers: [],
                images: [{ file: candidate.name, comment: readComment(comments, candidate.name) }]
            }, comments);
        }

        function tryLoad(candidates, searchedModel, comments, index = 0) {
            if (index >= candidates.length) {
                showMessage(
                    "該当する画像がありません",
                    "型番、4桁登録番号、または同じ名前の画像ファイルが登録されているか確認してください。",
                    searchedModel
                );
                modelInput.value = "";
                return;
            }

            const candidate = candidates[index];
            const probe = new Image();
            probe.onload = () => showLegacyImage(candidate, comments);
            probe.onerror = () => tryLoad(candidates, searchedModel, comments, index + 1);
            probe.src = `${candidate.url}?v=${Date.now()}`;
        }

        async function search(modelNo) {
            const trimmed = modelNo.trim();
            if (!trimmed) {
                result.classList.remove("isVisible");
                message.classList.add("isHidden");
                return;
            }

            const params = new URLSearchParams(window.location.search);
            params.set("model", trimmed);
            window.history.replaceState(null, "", `${window.location.pathname}?${params.toString()}`);
            const [catalog, comments] = await Promise.all([loadCatalog(), loadComments()]);
            const record = findRecord(catalog, trimmed);
            if (record) {
                showRecord(record, comments, trimmed);
                return;
            }
            tryLoad(buildCandidates(trimmed), trimmed, comments);
        }

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            search(modelInput.value);
        });

        const initialModel = new URLSearchParams(window.location.search).get("model");
        if (initialModel) {
            modelInput.value = initialModel;
            search(initialModel);
        }
    </script>
</body>
</html>
