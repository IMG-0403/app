<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PicScan Admin</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
            background: #f4f6f8;
            color: #17212b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
        }

        .appShell {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .topBar {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px;
        }

        .topBar a {
            color: #2274a5;
            font-weight: 700;
            text-decoration: none;
        }

        .label {
            margin: 0 0 6px;
            color: #5b6b7b;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0;
        }

        h1,
        h2 {
            margin: 0;
            letter-spacing: 0;
        }

        h1 {
            font-size: 2rem;
        }

        h2 {
            font-size: 1.18rem;
            line-height: 1.35;
        }

        .panel,
        .statusBox {
            background: #ffffff;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            box-shadow: 0 16px 38px rgba(32, 43, 54, 0.08);
        }

        .panel {
            padding: 18px;
            margin-bottom: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 700;
        }

        input,
        button {
            min-height: 44px;
            border-radius: 6px;
            font: inherit;
        }

        input {
            width: 100%;
            border: 1px solid #c7d1db;
            padding: 0 13px;
            background: #fbfcfd;
        }

        input[type="file"] {
            padding: 10px 13px;
        }

        input:focus {
            border-color: #2274a5;
            box-shadow: 0 0 0 3px rgba(34, 116, 165, 0.18);
            outline: none;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: 0;
            padding: 0 16px;
            background: #2274a5;
            color: #ffffff;
            cursor: pointer;
            font-weight: 700;
        }

        button.secondary {
            background: #3f596d;
        }

        button.danger {
            background: #b3261e;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .previewPanel {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }

        .imagePreview {
            display: grid;
            place-items: center;
            min-height: 280px;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            background: #eef2f6;
            overflow: hidden;
        }

        .imagePreview img {
            display: block;
            width: 100%;
            max-height: 460px;
            object-fit: contain;
        }

        .resultMeta {
            margin: 0;
            color: #334455;
            overflow-wrap: anywhere;
        }

        .listPanel {
            margin-top: 18px;
        }

        .imageList {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .imageListRow {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            background: #fbfcfd;
        }

        .imageListName {
            margin: 0;
            color: #17212b;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .imageListRow button {
            min-height: 38px;
        }

        .statusBox {
            padding: 14px 16px;
            color: #334455;
        }

        .hidden {
            display: none;
        }

        code {
            padding: 2px 5px;
            border-radius: 4px;
            background: #eef2f6;
        }

        @media (max-width: 720px) {
            .appShell {
                width: min(100% - 20px, 1080px);
                padding-top: 18px;
            }

            .topBar {
                align-items: start;
                flex-direction: column;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .imageListRow {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="appShell">
        <header class="topBar">
            <div>
                <p class="label">管理者画面</p>
                <h1>PicScan Admin</h1>
            </div>
            <a href="index.html">検索ページへ</a>
        </header>

        <section class="panel" id="loginPanel">
            <p class="label">管理者ログイン</p>
            <div class="grid">
                <div class="field">
                    <label for="account">アカウント</label>
                    <input id="account" autocomplete="username" placeholder="アカウント">
                </div>
                <div class="field">
                    <label for="password">パスワード</label>
                    <input id="password" type="password" autocomplete="current-password" placeholder="パスワード">
                </div>
            </div>
            <p class="label">GitHub設定</p>
            <div class="grid">
                <div class="field">
                    <label for="owner">Owner / Organization</label>
                    <input id="owner" autocomplete="organization" placeholder="例: img-0403">
                </div>
                <div class="field">
                    <label for="repo">Repository</label>
                    <input id="repo" autocomplete="off" placeholder="例: PicScan">
                </div>
                <div class="field">
                    <label for="token">GitHub Token</label>
                    <input id="token" type="password" autocomplete="off" placeholder="Contents Read and write">
                </div>
            </div>
            <div class="actions">
                <button id="loginButton" type="button">ログイン</button>
            </div>
        </section>

        <section class="panel hidden" id="adminPanel">
            <p class="label">画像管理</p>
            <div class="grid">
                <div class="field">
                    <label for="model">型番</label>
                    <input id="model" autocomplete="off" placeholder="例: ABC-123">
                </div>
                <div class="field">
                    <label for="photo">画像</label>
                    <input id="photo" type="file" accept="image/*" capture="environment">
                </div>
            </div>
            <div class="actions">
                <button id="uploadButton" type="button">画像を保存</button>
                <button id="searchButton" class="secondary" type="button">検索</button>
                <button id="renameButton" class="secondary" type="button" disabled>名前変更</button>
                <button id="deleteButton" class="danger" type="button" disabled>画像データ削除</button>
            </div>
            <div class="previewPanel hidden" id="previewPanel">
                <p class="resultMeta" id="resultMeta"></p>
                <div class="imagePreview">
                    <img id="resultImage" alt="">
                </div>
            </div>

            <div class="listPanel">
                <p class="label">登録画像一覧</p>
                <div class="actions">
                    <button id="refreshListButton" class="secondary" type="button">一覧更新</button>
                </div>
                <div class="imageList" id="imageList"></div>
            </div>
        </section>

        <section class="statusBox" id="status">ログインしてください。</section>
    </main>

    <script>
        const accountInput = document.getElementById("account");
        const passwordInput = document.getElementById("password");
        const ownerInput = document.getElementById("owner");
        const repoInput = document.getElementById("repo");
        const tokenInput = document.getElementById("token");
        const modelInput = document.getElementById("model");
        const photoInput = document.getElementById("photo");
        const loginPanel = document.getElementById("loginPanel");
        const adminPanel = document.getElementById("adminPanel");
        const previewPanel = document.getElementById("previewPanel");
        const resultMeta = document.getElementById("resultMeta");
        const resultImage = document.getElementById("resultImage");
        const statusBox = document.getElementById("status");
        const loginButton = document.getElementById("loginButton");
        const uploadButton = document.getElementById("uploadButton");
        const searchButton = document.getElementById("searchButton");
        const renameButton = document.getElementById("renameButton");
        const deleteButton = document.getElementById("deleteButton");
        const refreshListButton = document.getElementById("refreshListButton");
        const imageList = document.getElementById("imageList");

        const adminAccount = "img";
        const adminPassword = "5381";
        const knownExtensions = [".jpg", ".jpeg", ".png", ".webp", ".gif"];
        let session = null;
        let currentImage = null;
        let currentObjectUrl = "";

        ownerInput.value = localStorage.getItem("picscanOwner") || "img-0403";
        repoInput.value = localStorage.getItem("picscanRepo") || "PicScan";

        function setStatus(message) {
            statusBox.textContent = message;
        }

        function setBusy(isBusy) {
            [loginButton, uploadButton, searchButton, renameButton, deleteButton, refreshListButton].forEach((button) => {
                button.disabled = isBusy;
            });
            imageList.querySelectorAll("button").forEach((button) => {
                button.disabled = isBusy;
            });
            if (!isBusy) {
                updateResultActions();
            }
        }

        function updateResultActions() {
            const hasImage = Boolean(currentImage);
            renameButton.disabled = !hasImage;
            deleteButton.disabled = !hasImage;
        }

        function clearPreview() {
            currentImage = null;
            if (currentObjectUrl) {
                URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = "";
            }
            resultImage.removeAttribute("src");
            resultMeta.textContent = "";
            previewPanel.classList.add("hidden");
            updateResultActions();
        }

        function showPreview(image) {
            currentImage = image;
            if (currentObjectUrl) {
                URL.revokeObjectURL(currentObjectUrl);
            }
            currentObjectUrl = URL.createObjectURL(new Blob([image.bytes], { type: image.mimeType }));
            resultImage.src = currentObjectUrl;
            resultImage.alt = image.name;
            resultMeta.textContent = `images/${image.name}`;
            previewPanel.classList.remove("hidden");
            updateResultActions();
        }

        function normalizeBaseName(value) {
            return value.trim().replaceAll("\\", "/").split("/").pop();
        }

        function normalizeFileName(value, fallbackExtension = ".jpg") {
            const clean = normalizeBaseName(value);
            if (!clean) {
                return "";
            }
            return /\.[a-z0-9]+$/i.test(clean) ? clean : `${clean}${fallbackExtension}`;
        }

        function modelCandidates(value) {
            const clean = normalizeBaseName(value);
            if (!clean) {
                return [];
            }
            if (/\.[a-z0-9]+$/i.test(clean)) {
                return [clean];
            }
            return knownExtensions.map((extension) => `${clean}${extension}`);
        }

        function buildGitHubSession() {
            return {
                owner: ownerInput.value.trim(),
                repo: repoInput.value.trim(),
                branch: "main",
                token: tokenInput.value.trim()
            };
        }

        function ensureGitHubSession() {
            session = buildGitHubSession();
            if (!session.owner || !session.repo || !session.token) {
                throw new Error("GitHub接続情報が不足しています。");
            }
            localStorage.setItem("picscanOwner", session.owner);
            localStorage.setItem("picscanRepo", session.repo);
        }

        function githubHeaders() {
            return {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${session.token}`,
                "X-GitHub-Api-Version": "2022-11-28"
            };
        }

        function contentUrl(fileName = "", includeRef = true) {
            const encodedName = encodeURIComponent(fileName).replaceAll("%2F", "/");
            const path = encodedName ? `/contents/images/${encodedName}` : "/contents/images";
            const base = `https://api.github.com/repos/${session.owner}/${session.repo}${path}`;
            return includeRef ? `${base}?ref=${encodeURIComponent(session.branch)}` : base;
        }

        async function githubRequest(url, options = {}) {
            const response = await fetch(url, options);
            const text = await response.text();
            const body = text ? JSON.parse(text) : null;
            if (!response.ok) {
                const message = body && body.message ? body.message : text;
                throw new Error(`GitHub API error ${response.status}: ${message}`);
            }
            return body;
        }

        async function listImages() {
            const body = await githubRequest(contentUrl(), {
                headers: githubHeaders()
            });
            return Array.isArray(body)
                ? body.filter((item) => item.type === "file").sort((a, b) => a.name.localeCompare(b.name, "ja"))
                : [];
        }

        function renderImageList(files) {
            imageList.textContent = "";
            if (!files.length) {
                const empty = document.createElement("p");
                empty.className = "resultMeta";
                empty.textContent = "登録画像はありません。";
                imageList.appendChild(empty);
                return;
            }

            files.forEach((file) => {
                const row = document.createElement("div");
                row.className = "imageListRow";

                const name = document.createElement("p");
                name.className = "imageListName";
                name.textContent = file.name;

                const selectButton = document.createElement("button");
                selectButton.className = "secondary";
                selectButton.type = "button";
                selectButton.textContent = "選択";
                selectButton.addEventListener("click", () => selectListedImage(file.name));

                const removeButton = document.createElement("button");
                removeButton.className = "danger";
                removeButton.type = "button";
                removeButton.textContent = "削除";
                removeButton.addEventListener("click", () => deleteListedImage(file));

                row.appendChild(name);
                row.appendChild(selectButton);
                row.appendChild(removeButton);
                imageList.appendChild(row);
            });
        }

        async function refreshImageList() {
            setStatus("登録画像一覧を取得中...");
            const files = await listImages();
            renderImageList(files);
            setStatus(`登録画像一覧を表示しました: ${files.length}件`);
        }

        async function selectListedImage(fileName) {
            try {
                ensureGitHubSession();
                setBusy(true);
                setStatus(`読み込み中: images/${fileName}`);
                const image = await getImage(fileName);
                if (!image) {
                    setStatus("画像が見つかりませんでした。");
                    await refreshImageList();
                    return;
                }
                modelInput.value = fileName.replace(/\.[^.]+$/, "");
                showPreview(image);
                setStatus(`選択しました: images/${image.name}`);
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        }

        async function deleteListedImage(file) {
            if (!confirm(`images/${file.name} を削除しますか？`)) {
                return;
            }

            try {
                ensureGitHubSession();
                setBusy(true);
                setStatus(`削除中: images/${file.name}`);
                await deleteImage(file.name, file.sha);
                if (currentImage && currentImage.name === file.name) {
                    clearPreview();
                }
                await refreshImageList();
                setStatus(`削除しました: images/${file.name}`);
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        }

        async function getImage(fileName) {
            const response = await fetch(contentUrl(fileName), {
                headers: githubHeaders()
            });
            if (response.status === 404) {
                return null;
            }
            const body = await response.json();
            if (!response.ok) {
                throw new Error(`GitHub API error ${response.status}: ${body.message || "request failed"}`);
            }
            const binary = atob(body.content.replace(/\n/g, ""));
            const bytes = new Uint8Array(binary.length);
            for (let index = 0; index < binary.length; index += 1) {
                bytes[index] = binary.charCodeAt(index);
            }
            return {
                name: body.name,
                sha: body.sha,
                bytes,
                mimeType: contentTypeForName(body.name),
                downloadUrl: body.download_url
            };
        }

        async function findImage(value) {
            const candidates = modelCandidates(value);
            for (const candidate of candidates) {
                const image = await getImage(candidate);
                if (image) {
                    return image;
                }
            }

            const clean = normalizeBaseName(value);
            if (!clean || /\.[a-z0-9]+$/i.test(clean)) {
                return null;
            }

            const files = await listImages();
            const matched = files.find((file) => {
                const baseName = file.name.replace(/\.[^.]+$/, "");
                return baseName.toLowerCase() === clean.toLowerCase();
            });
            return matched ? getImage(matched.name) : null;
        }

        function contentTypeForName(fileName) {
            const extension = fileName.split(".").pop().toLowerCase();
            if (extension === "png") {
                return "image/png";
            }
            if (extension === "webp") {
                return "image/webp";
            }
            if (extension === "gif") {
                return "image/gif";
            }
            return "image/jpeg";
        }

        function bytesToBase64(bytes) {
            let binary = "";
            const chunkSize = 8192;
            for (let offset = 0; offset < bytes.length; offset += chunkSize) {
                const chunk = bytes.slice(offset, offset + chunkSize);
                binary += String.fromCharCode(...chunk);
            }
            return btoa(binary);
        }

        async function putImage(fileName, bytes, sha = null, message = `Upload ${fileName}`) {
            const payload = {
                message,
                branch: session.branch,
                content: bytesToBase64(bytes)
            };
            if (sha) {
                payload.sha = sha;
            }
            await githubRequest(contentUrl(fileName, false), {
                method: "PUT",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
        }

        async function deleteImage(fileName, sha, message = `Delete ${fileName}`) {
            await githubRequest(contentUrl(fileName, false), {
                method: "DELETE",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message,
                    branch: session.branch,
                    sha
                })
            });
        }

        async function uploadImage(fileName, bytes) {
            const existing = await getImage(fileName);
            await putImage(fileName, bytes, existing ? existing.sha : null, `Upload ${fileName}`);
        }

        loginButton.addEventListener("click", async () => {
            const account = accountInput.value.trim();
            const password = passwordInput.value;
            if (account !== adminAccount || password !== adminPassword) {
                setStatus("アカウントまたはパスワードが違います。");
                return;
            }

            try {
                ensureGitHubSession();
                setBusy(true);
                setStatus("ログイン確認中...");
                await refreshImageList();
                passwordInput.value = "";
                loginPanel.classList.add("hidden");
                adminPanel.classList.remove("hidden");
                setStatus("ログインしました。");
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });

        [accountInput, passwordInput, modelInput].forEach((input) => {
            input.addEventListener("keydown", (event) => {
                if (event.key === "Enter") {
                    if (input === modelInput) {
                        searchButton.click();
                    } else {
                        loginButton.click();
                    }
                }
            });
        });

        uploadButton.addEventListener("click", async () => {
            const modelNo = modelInput.value.trim();
            const file = photoInput.files[0];
            if (!modelNo) {
                setStatus("型番を入力してください。");
                return;
            }
            if (!file) {
                setStatus("画像ファイルを選択してください。");
                return;
            }

            const extension = file.name.match(/\.[a-z0-9]+$/i)?.[0] || ".jpg";
            const fileName = normalizeFileName(modelNo, extension);
            try {
                ensureGitHubSession();
                setBusy(true);
                setStatus(`保存中: images/${fileName}`);
                const bytes = new Uint8Array(await file.arrayBuffer());
                await uploadImage(fileName, bytes);
                const image = await getImage(fileName);
                if (image) {
                    showPreview(image);
                }
                await refreshImageList();
                setStatus(`保存しました: images/${fileName}`);
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });

        searchButton.addEventListener("click", async () => {
            const modelNo = modelInput.value.trim();
            if (!modelNo) {
                setStatus("型番を入力してください。");
                return;
            }

            try {
                ensureGitHubSession();
                setBusy(true);
                clearPreview();
                setStatus(`検索中: ${modelNo}`);
                const image = await findImage(modelNo);
                if (!image) {
                    setStatus("画像が見つかりませんでした。");
                    return;
                }
                showPreview(image);
                setStatus(`表示しました: images/${image.name}`);
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });

        renameButton.addEventListener("click", async () => {
            if (!currentImage) {
                return;
            }

            const nextValue = prompt("変更後の型番を入力してください。", currentImage.name.replace(/\.[^.]+$/, ""));
            if (nextValue === null) {
                return;
            }
            const extension = currentImage.name.match(/\.[a-z0-9]+$/i)?.[0] || ".jpg";
            const nextName = normalizeFileName(nextValue, extension);
            if (!nextName) {
                setStatus("変更後の型番を入力してください。");
                return;
            }
            if (nextName === currentImage.name) {
                setStatus("同じ名前です。");
                return;
            }

            try {
                ensureGitHubSession();
                setBusy(true);
                setStatus(`名前変更中: images/${currentImage.name} -> images/${nextName}`);
                const existing = await getImage(nextName);
                if (existing && !confirm(`images/${nextName} は既に存在します。上書きしますか？`)) {
                    setStatus("名前変更をキャンセルしました。");
                    return;
                }
                await putImage(nextName, currentImage.bytes, existing ? existing.sha : null, `Rename ${currentImage.name} to ${nextName}`);
                await deleteImage(currentImage.name, currentImage.sha, `Remove ${currentImage.name} after rename`);
                const renamed = await getImage(nextName);
                if (renamed) {
                    modelInput.value = nextName.replace(/\.[^.]+$/, "");
                    showPreview(renamed);
                }
                await refreshImageList();
                setStatus(`名前変更しました: images/${nextName}`);
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });

        deleteButton.addEventListener("click", async () => {
            if (!currentImage) {
                return;
            }
            if (!confirm(`images/${currentImage.name} を削除しますか？`)) {
                return;
            }

            try {
                ensureGitHubSession();
                setBusy(true);
                setStatus(`削除中: images/${currentImage.name}`);
                await deleteImage(currentImage.name, currentImage.sha);
                clearPreview();
                await refreshImageList();
                setStatus("画像データを削除しました。");
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });

        refreshListButton.addEventListener("click", async () => {
            try {
                ensureGitHubSession();
                setBusy(true);
                await refreshImageList();
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });
    </script>
</body>
</html>
