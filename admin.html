<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PicScan Admin</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
            background: #f4f6f8;
            color: #17212b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
        }

        .appShell {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .topBar {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px;
        }

        .topBar a {
            color: #2274a5;
            font-weight: 700;
            text-decoration: none;
        }

        .label {
            margin: 0 0 6px;
            color: #5b6b7b;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0;
        }

        h1,
        h2 {
            margin: 0;
            letter-spacing: 0;
        }

        h1 {
            font-size: 2rem;
        }

        h2 {
            font-size: 1.18rem;
            line-height: 1.35;
        }

        .panel,
        .statusBox {
            background: #ffffff;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            box-shadow: 0 16px 38px rgba(32, 43, 54, 0.08);
        }

        .panel {
            padding: 18px;
            margin-bottom: 18px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field.full {
            grid-column: 1 / -1;
        }

        label {
            font-weight: 700;
        }

        input,
        textarea,
        button {
            min-height: 44px;
            border-radius: 6px;
            font: inherit;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid #c7d1db;
            padding: 0 13px;
            background: #fbfcfd;
        }

        textarea {
            min-height: 92px;
            padding: 10px 13px;
            resize: vertical;
        }

        input[type="file"] {
            padding: 10px 13px;
        }

        input:focus,
        textarea:focus {
            border-color: #2274a5;
            box-shadow: 0 0 0 3px rgba(34, 116, 165, 0.18);
            outline: none;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: 0;
            padding: 0 16px;
            background: #2274a5;
            color: #ffffff;
            cursor: pointer;
            font-weight: 700;
        }

        button.secondary {
            background: #3f596d;
        }

        button.danger {
            background: #b3261e;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .previewPanel {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }

        .imagePreview {
            display: grid;
            place-items: center;
            min-height: 280px;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            background: #eef2f6;
            overflow: hidden;
        }

        .imagePreview img {
            display: block;
            width: 100%;
            max-height: 460px;
            object-fit: contain;
        }

        .recordImageGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .recordImageItem {
            overflow: hidden;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            background: #ffffff;
        }

        .recordImageItem.isSelected {
            border-color: #2274a5;
            box-shadow: 0 0 0 3px rgba(34, 116, 165, 0.18);
        }

        .recordImageItem .imageZoomButton {
            display: block;
            width: 100%;
            min-height: 0;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            color: inherit;
        }

        .recordImageFrame {
            display: grid;
            place-items: center;
            min-height: 180px;
            padding: 10px;
            background: #eef2f6;
        }

        .recordImageFrame img {
            display: block;
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
        }

        .recordImageCaption {
            margin: 0;
            padding: 10px 12px;
            color: #334455;
            font-size: 0.92rem;
            line-height: 1.45;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .recordImageActions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 0 10px 10px;
        }

        .recordImageActions button {
            min-height: 36px;
            padding: 0 10px;
            background: #3f596d;
            font-size: 0.9rem;
        }

        .recordImageActions button:disabled {
            opacity: 0.45;
        }

        .resultMeta {
            margin: 0;
            color: #334455;
            overflow-wrap: anywhere;
        }

        .imageComment {
            margin: 0;
            padding: 12px 14px;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            background: #fbfcfd;
            color: #17212b;
            line-height: 1.65;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .listPanel {
            margin-top: 18px;
        }

        .imageList {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .imageListRow {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border: 1px solid #dce3ea;
            border-radius: 8px;
            background: #fbfcfd;
        }

        .imageListName {
            margin: 0;
            color: #17212b;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .imageListRow button {
            min-height: 38px;
        }

        .statusBox {
            padding: 14px 16px;
            color: #334455;
        }

        .hidden {
            display: none;
        }

        code {
            padding: 2px 5px;
            border-radius: 4px;
            background: #eef2f6;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(11, 18, 26, 0.78);
        }

        .lightbox.hidden {
            display: none;
        }

        .lightboxPanel {
            width: min(100%, 1080px);
            max-height: calc(100vh - 48px);
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            overflow: hidden;
            border-radius: 8px;
            background: #ffffff;
        }

        .lightboxHeader {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-bottom: 1px solid #dce3ea;
        }

        .lightboxHeader p {
            margin: 0;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .lightboxClose {
            min-height: 36px;
            width: 44px;
            padding: 0;
            font-size: 1.25rem;
        }

        .lightboxImageWrap {
            display: grid;
            place-items: center;
            min-height: 0;
            background: #101820;
        }

        .lightboxImageWrap img {
            display: block;
            max-width: 100%;
            max-height: calc(100vh - 180px);
            object-fit: contain;
        }

        .lightboxComment {
            margin: 0;
            padding: 12px 14px;
            line-height: 1.55;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        @media (max-width: 720px) {
            .appShell {
                width: min(100% - 20px, 1080px);
                padding-top: 18px;
            }

            .topBar {
                align-items: start;
                flex-direction: column;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .imageListRow {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="appShell">
        <header class="topBar">
            <div>
                <p class="label">管理者画面</p>
                <h1>PicScan Admin</h1>
            </div>
            <a href="index.html">検索ページへ</a>
        </header>

        <section class="panel" id="loginPanel">
            <p class="label">管理者ログイン</p>
            <div class="grid">
                <div class="field">
                    <label for="account">アカウント</label>
                    <input id="account" autocomplete="username" placeholder="アカウント">
                </div>
                <div class="field">
                    <label for="password">パスワード</label>
                    <input id="password" type="password" autocomplete="current-password" placeholder="パスワード">
                </div>
            </div>
            <p class="label">GitHub設定</p>
            <div class="grid">
                <div class="field">
                    <label for="owner">Owner / Organization</label>
                    <input id="owner" autocomplete="organization" placeholder="例: img-0403">
                </div>
                <div class="field">
                    <label for="repo">Repository</label>
                    <input id="repo" autocomplete="off" placeholder="例: PicScan">
                </div>
                <div class="field">
                    <label for="token">GitHub Token</label>
                    <input id="token" type="password" autocomplete="off" placeholder="Contents Read and write">
                </div>
            </div>
            <div class="actions">
                <button id="loginButton" type="button">ログイン</button>
            </div>
        </section>

        <section class="panel hidden" id="adminPanel">
            <p class="label">画像管理</p>
            <div class="grid">
                <div class="field">
                    <label for="model">登録名</label>
                    <input id="model" autocomplete="off" placeholder="例: 商品A">
                </div>
                <div class="field">
                    <label for="numbers">登録番号4桁</label>
                    <input id="numbers" autocomplete="off" placeholder="例: 1234, 5678">
                </div>
                <div class="field">
                    <label for="photo">画像</label>
                    <input id="photo" type="file" accept="image/*" capture="environment" multiple>
                </div>
                <div class="field full">
                    <label for="comment">コメント</label>
                    <textarea id="comment" maxlength="1000" placeholder="画像と一緒に表示するコメント"></textarea>
                </div>
            </div>
            <div class="actions">
                <button id="uploadButton" type="button">登録を保存</button>
                <button id="searchButton" class="secondary" type="button">検索</button>
                <button id="commentButton" class="secondary hidden" type="button" disabled>コメント保存</button>
                <button id="renameButton" class="secondary hidden" type="button" disabled>名前変更</button>
                <button id="deleteButton" class="danger" type="button" disabled>画像データ削除</button>
            </div>
            <div class="previewPanel hidden" id="previewPanel">
                <p class="resultMeta" id="resultMeta"></p>
                <p class="imageComment hidden" id="resultComment"></p>
                <div class="recordImageGrid" id="recordImageGrid"></div>
                <div class="imagePreview">
                    <img id="resultImage" alt="">
                </div>
            </div>

            <div class="listPanel">
                <p class="label">登録画像一覧</p>
                <div class="actions">
                    <button id="refreshListButton" class="secondary" type="button">一覧更新</button>
                </div>
                <div class="imageList" id="imageList"></div>
            </div>
        </section>

        <section class="statusBox" id="status">ログインしてください。</section>

        <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-labelledby="lightboxTitle">
            <div class="lightboxPanel">
                <div class="lightboxHeader">
                    <p id="lightboxTitle"></p>
                    <button class="lightboxClose" id="lightboxClose" type="button" aria-label="閉じる">×</button>
                </div>
                <div class="lightboxImageWrap">
                    <img id="lightboxImage" src="" alt="">
                </div>
                <p class="lightboxComment" id="lightboxComment"></p>
            </div>
        </div>
    </main>

    <script>
        const accountInput = document.getElementById("account");
        const passwordInput = document.getElementById("password");
        const ownerInput = document.getElementById("owner");
        const repoInput = document.getElementById("repo");
        const tokenInput = document.getElementById("token");
        const modelInput = document.getElementById("model");
        const numbersInput = document.getElementById("numbers");
        const photoInput = document.getElementById("photo");
        const commentInput = document.getElementById("comment");
        const loginPanel = document.getElementById("loginPanel");
        const adminPanel = document.getElementById("adminPanel");
        const previewPanel = document.getElementById("previewPanel");
        const resultMeta = document.getElementById("resultMeta");
        const resultComment = document.getElementById("resultComment");
        const recordImageGrid = document.getElementById("recordImageGrid");
        const resultImage = document.getElementById("resultImage");
        const statusBox = document.getElementById("status");
        const loginButton = document.getElementById("loginButton");
        const uploadButton = document.getElementById("uploadButton");
        const searchButton = document.getElementById("searchButton");
        const commentButton = document.getElementById("commentButton");
        const renameButton = document.getElementById("renameButton");
        const deleteButton = document.getElementById("deleteButton");
        const refreshListButton = document.getElementById("refreshListButton");
        const imageList = document.getElementById("imageList");
        const lightbox = document.getElementById("lightbox");
        const lightboxTitle = document.getElementById("lightboxTitle");
        const lightboxImage = document.getElementById("lightboxImage");
        const lightboxComment = document.getElementById("lightboxComment");
        const lightboxClose = document.getElementById("lightboxClose");

        const adminAccount = "img";
        const adminPassword = "5381";
        const knownExtensions = [".jpg", ".jpeg", ".png", ".webp", ".gif"];
        let session = null;
        let currentImage = null;
        let currentObjectUrl = "";

        ownerInput.value = localStorage.getItem("picscanOwner") || "img-0403";
        repoInput.value = localStorage.getItem("picscanRepo") || "PicScan";

        function setStatus(message) {
            statusBox.textContent = message;
        }

        function setBusy(isBusy) {
            [loginButton, uploadButton, searchButton, commentButton, renameButton, deleteButton, refreshListButton].forEach((button) => {
                button.disabled = isBusy;
            });
            imageList.querySelectorAll("button").forEach((button) => {
                button.disabled = isBusy;
            });
            if (!isBusy) {
                updateResultActions();
            }
        }

        function updateResultActions() {
            const hasImage = Boolean(currentImage);
            commentButton.disabled = !hasImage;
            renameButton.disabled = !hasImage || !currentImage.bytes;
            deleteButton.disabled = !hasImage;
        }

        function clearPreview() {
            currentImage = null;
            if (currentObjectUrl) {
                URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = "";
            }
            resultImage.removeAttribute("src");
            resultMeta.textContent = "";
            resultComment.textContent = "";
            resultComment.classList.add("hidden");
            recordImageGrid.textContent = "";
            numbersInput.value = "";
            commentInput.value = "";
            photoInput.value = "";
            previewPanel.classList.add("hidden");
            updateResultActions();
        }

        function encodePathSegment(value) {
            return value.split("/").map(encodeURIComponent).join("/");
        }

        function imageUrl(fileName) {
            return `images/${encodePathSegment(fileName)}`;
        }

        function openLightbox(title, src, comment) {
            lightboxTitle.textContent = title;
            lightboxImage.src = src;
            lightboxImage.alt = title;
            lightboxComment.textContent = comment || "";
            lightbox.classList.remove("hidden");
        }

        function closeLightbox() {
            lightbox.classList.add("hidden");
            lightboxImage.removeAttribute("src");
            lightboxImage.alt = "";
        }

        function renderRecordImages(image) {
            const images = Array.isArray(image.recordImages) && image.recordImages.length
                ? image.recordImages
                : [{ file: image.name, comment: image.comment || "" }];
            image.recordImages = images;
            recordImageGrid.textContent = "";
            images.slice(0, 6).forEach((entry, index) => {
                const item = document.createElement("article");
                item.className = "recordImageItem";
                if (entry.file === image.name) {
                    item.classList.add("isSelected");
                }

                const button = document.createElement("button");
                button.className = "imageZoomButton";
                button.type = "button";

                const frame = document.createElement("div");
                frame.className = "recordImageFrame";

                const img = document.createElement("img");
                const src = entry.file === image.name && currentObjectUrl ? currentObjectUrl : imageUrl(entry.file);
                img.src = src;
                img.alt = `${image.recordName || image.name} ${entry.file}`;

                const caption = document.createElement("p");
                caption.className = "recordImageCaption";
                caption.textContent = entry.comment || "";

                frame.appendChild(img);
                button.appendChild(frame);
                button.addEventListener("click", () => openLightbox(img.alt, src, caption.textContent));
                item.appendChild(button);
                item.appendChild(caption);

                const actions = document.createElement("div");
                actions.className = "recordImageActions";

                const upButton = document.createElement("button");
                upButton.type = "button";
                upButton.textContent = "前へ";
                upButton.disabled = index === 0;
                upButton.addEventListener("click", () => moveRecordImage(index, -1));

                const downButton = document.createElement("button");
                downButton.type = "button";
                downButton.textContent = "後へ";
                downButton.disabled = index === images.length - 1 || index >= 5;
                downButton.addEventListener("click", () => moveRecordImage(index, 1));

                actions.appendChild(upButton);
                actions.appendChild(downButton);
                item.appendChild(actions);
                recordImageGrid.appendChild(item);
            });
        }

        function moveRecordImage(index, direction) {
            if (!currentImage || !Array.isArray(currentImage.recordImages)) {
                return;
            }
            const nextIndex = index + direction;
            if (nextIndex < 0 || nextIndex >= currentImage.recordImages.length) {
                return;
            }
            const images = currentImage.recordImages;
            const moved = images[index];
            images[index] = images[nextIndex];
            images[nextIndex] = moved;
            renderRecordImages(currentImage);
            setStatus("表示順を変更しました。登録を保存すると反映されます。");
        }

        function showPreview(image) {
            currentImage = image;
            if (currentObjectUrl) {
                URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = "";
            }
            if (image.bytes && image.bytes.length) {
                currentObjectUrl = URL.createObjectURL(new Blob([image.bytes], { type: image.mimeType }));
                resultImage.src = currentObjectUrl;
            } else if (image.downloadUrl) {
                resultImage.src = `${image.downloadUrl}${image.downloadUrl.includes("?") ? "&" : "?"}v=${Date.now()}`;
            } else {
                resultImage.removeAttribute("src");
            }
            resultImage.alt = image.name;
            const recordText = image.recordName ? ` / 登録名: ${image.recordName}` : "";
            const numberText = image.numbers && image.numbers.length ? ` / 登録番号: ${image.numbers.join(", ")}` : "";
            resultMeta.textContent = `images/${image.name}${recordText}${numberText}`;
            resultComment.textContent = image.comment || "";
            resultComment.classList.toggle("hidden", !image.comment);
            commentInput.value = image.comment || "";
            if (image.recordName) {
                modelInput.value = image.recordName;
            }
            if (image.numbers) {
                numbersInput.value = image.numbers.join(", ");
            }
            renderRecordImages(image);
            previewPanel.classList.remove("hidden");
            updateResultActions();
        }

        function normalizeBaseName(value) {
            return value.trim().replaceAll("\\", "/").split("/").pop();
        }

        function normalizeFileName(value, fallbackExtension = ".jpg") {
            const clean = normalizeBaseName(value);
            if (!clean) {
                return "";
            }
            return /\.[a-z0-9]+$/i.test(clean) ? clean : `${clean}${fallbackExtension}`;
        }

        function safeFileBase(value) {
            return normalizeBaseName(value)
                .replace(/\.[^.]+$/, "")
                .replace(/[<>:"/\\|?*\u0000-\u001f]/g, "_")
                .trim()
                || "image";
        }

        function parseNumbers(value) {
            return [...new Set(value.split(/[\s,、]+/)
                .map((number) => number.trim())
                .filter(Boolean))]
                .filter((number) => /^\d{4}$/.test(number));
        }

        function parseNumberTokens(value) {
            return value.split(/[\s,、]+/)
                .map((number) => number.trim())
                .filter(Boolean);
        }

        function modelCandidates(value) {
            const clean = normalizeBaseName(value);
            if (!clean) {
                return [];
            }
            if (/\.[a-z0-9]+$/i.test(clean)) {
                return [clean];
            }
            return knownExtensions.map((extension) => `${clean}${extension}`);
        }

        function buildGitHubSession() {
            return {
                owner: ownerInput.value.trim(),
                repo: repoInput.value.trim(),
                branch: localStorage.getItem("picscanBranch") || "main",
                token: tokenInput.value.trim()
            };
        }

        function ensureGitHubSession() {
            session = buildGitHubSession();
            if (!session.owner || !session.repo || !session.token) {
                throw new Error("GitHub接続情報が不足しています。");
            }
            localStorage.setItem("picscanOwner", session.owner);
            localStorage.setItem("picscanRepo", session.repo);
        }

        function githubHeaders() {
            return {
                "Accept": "application/vnd.github+json",
                "Authorization": `Bearer ${session.token}`,
                "X-GitHub-Api-Version": "2022-11-28"
            };
        }

        async function resolveGitHubBranch() {
            const response = await fetch(`https://api.github.com/repos/${session.owner}/${session.repo}`, {
                headers: githubHeaders()
            });
            const text = await response.text();
            const body = text ? JSON.parse(text) : null;
            if (!response.ok) {
                const message = body && body.message ? body.message : text;
                if (response.status === 404) {
                    throw new Error(`GitHubリポジトリが見つかりません: ${session.owner}/${session.repo}。Owner、Repository、Token権限を確認してください。`);
                }
                throw new Error(`GitHub API error ${response.status}: ${message}`);
            }
            const defaultBranch = body && body.default_branch ? body.default_branch : session.branch;
            session.branch = defaultBranch;
            localStorage.setItem("picscanBranch", defaultBranch);
            return defaultBranch;
        }

        function contentUrl(fileName = "", includeRef = true) {
            const encodedName = encodeURIComponent(fileName).replaceAll("%2F", "/");
            const path = encodedName ? `/contents/images/${encodedName}` : "/contents/images";
            const base = `https://api.github.com/repos/${session.owner}/${session.repo}${path}`;
            return includeRef ? `${base}?ref=${encodeURIComponent(session.branch)}` : base;
        }

        function repoContentUrl(path, includeRef = true) {
            const encodedPath = path.split("/").map(encodeURIComponent).join("/");
            const base = `https://api.github.com/repos/${session.owner}/${session.repo}/contents/${encodedPath}`;
            return includeRef ? `${base}?ref=${encodeURIComponent(session.branch)}` : base;
        }

        async function githubRequest(url, options = {}) {
            const response = await fetch(url, options);
            const text = await response.text();
            const body = text ? JSON.parse(text) : null;
            if (!response.ok) {
                const message = body && body.message ? body.message : text;
                throw new Error(`GitHub API error ${response.status}: ${message}`);
            }
            return body;
        }

        function decodeBase64Text(content) {
            const binary = atob(content.replace(/\n/g, ""));
            const bytes = new Uint8Array(binary.length);
            for (let index = 0; index < binary.length; index += 1) {
                bytes[index] = binary.charCodeAt(index);
            }
            return new TextDecoder().decode(bytes);
        }

        function encodeBase64Text(text) {
            const bytes = new TextEncoder().encode(text);
            let binary = "";
            const chunkSize = 8192;
            for (let offset = 0; offset < bytes.length; offset += chunkSize) {
                const chunk = bytes.slice(offset, offset + chunkSize);
                binary += String.fromCharCode(...chunk);
            }
            return btoa(binary);
        }

        async function loadCommentsFile() {
            const response = await fetch(repoContentUrl("comments.json"), {
                headers: githubHeaders()
            });
            if (response.status === 404) {
                return { sha: null, comments: {} };
            }
            const body = await response.json();
            if (!response.ok) {
                throw new Error(`GitHub API error ${response.status}: ${body.message || "request failed"}`);
            }

            let comments = {};
            try {
                comments = JSON.parse(decodeBase64Text(body.content));
            } catch (error) {
                comments = {};
            }
            return { sha: body.sha, comments: comments && typeof comments === "object" ? comments : {} };
        }

        async function saveCommentsFile(comments, sha) {
            const payload = {
                message: "Update image comments",
                branch: session.branch,
                content: encodeBase64Text(`${JSON.stringify(comments, null, 2)}\n`)
            };
            if (sha) {
                payload.sha = sha;
            }
            await githubRequest(repoContentUrl("comments.json", false), {
                method: "PUT",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
        }

        async function loadCatalogFile() {
            const response = await fetch(repoContentUrl("catalog.json"), {
                headers: githubHeaders()
            });
            if (response.status === 404) {
                return { sha: null, catalog: { records: [] } };
            }
            const body = await response.json();
            if (!response.ok) {
                throw new Error(`GitHub API error ${response.status}: ${body.message || "request failed"}`);
            }

            let catalog = { records: [] };
            try {
                catalog = JSON.parse(decodeBase64Text(body.content));
            } catch (error) {
                catalog = { records: [] };
            }
            return { sha: body.sha, catalog: normalizeCatalog(catalog) };
        }

        function normalizeCatalog(catalog) {
            const records = Array.isArray(catalog)
                ? catalog
                : Array.isArray(catalog && catalog.records)
                    ? catalog.records
                    : [];
            const merged = [];
            records.map((record) => ({
                name: String(record && record.name || "").trim(),
                numbers: Array.isArray(record && record.numbers)
                    ? record.numbers.map((number) => String(number).trim()).filter((number) => /^\d{4}$/.test(number))
                    : [],
                images: Array.isArray(record && record.images)
                    ? record.images.slice(0, 6).map((image) => ({
                        file: String(image && (image.file || image.name) || "").trim(),
                        comment: typeof (image && image.comment) === "string" ? image.comment : ""
                    })).filter((image) => image.file)
                    : []
            })).filter((record) => record.name).forEach((record) => {
                const existing = merged.find((item) => item.name.toLowerCase() === record.name.toLowerCase());
                if (!existing) {
                    merged.push(record);
                    return;
                }
                existing.numbers = [...new Set([...existing.numbers, ...record.numbers])];
                record.images.forEach((image) => {
                    if (existing.images.length < 6 && !existing.images.some((item) => item.file === image.file)) {
                        existing.images.push(image);
                    }
                });
            });
            return {
                records: merged
            };
        }

        async function saveCatalogFile(catalog, sha) {
            const payload = {
                message: "Update image catalog",
                branch: session.branch,
                content: encodeBase64Text(`${JSON.stringify(normalizeCatalog(catalog), null, 2)}\n`)
            };
            if (sha) {
                payload.sha = sha;
            }
            await githubRequest(repoContentUrl("catalog.json", false), {
                method: "PUT",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
        }

        function findCatalogRecord(catalog, value) {
            const query = value.trim();
            const normalized = query.toLowerCase();
            return catalog.records.find((record) => record.name.toLowerCase() === normalized)
                || catalog.records.find((record) => record.numbers.includes(query));
        }

        function findRecordByImage(catalog, fileName) {
            return catalog.records.find((record) => record.images.some((image) => image.file === fileName));
        }

        function findRecordIndexByImage(catalog, fileName) {
            return catalog.records.findIndex((record) => record.images.some((image) => image.file === fileName));
        }

        function findRecordByName(catalog, name) {
            const normalized = name.trim().toLowerCase();
            return catalog.records.find((record) => record.name.toLowerCase() === normalized);
        }

        function findOtherRecordByName(catalog, name, currentRecord) {
            const normalized = name.trim().toLowerCase();
            return catalog.records.find((record) => record !== currentRecord && record.name.toLowerCase() === normalized);
        }

        function nextCatalogFileName(recordName, existingImages, originalFileName) {
            const extension = originalFileName.match(/\.[a-z0-9]+$/i)?.[0] || ".jpg";
            const base = safeFileBase(recordName);
            for (let index = 1; index <= 6; index += 1) {
                const candidate = `${base}/${base}_${index}${extension}`;
                if (!existingImages.some((image) => image.file === candidate)) {
                    return candidate;
                }
            }
            return "";
        }

        async function attachCatalogToImage(image) {
            const { catalog } = await loadCatalogFile();
            const record = findRecordByImage(catalog, image.name);
            if (!record) {
                return image;
            }
            const item = record.images.find((entry) => entry.file === image.name);
            return {
                ...image,
                recordName: record.name,
                numbers: record.numbers,
                recordImages: record.images,
                comment: item && item.comment ? item.comment : image.comment
            };
        }

        function commentKey(fileName) {
            return `images/${fileName}`;
        }

        function readComment(comments, fileName) {
            const value = comments[commentKey(fileName)] ?? comments[fileName] ?? "";
            if (typeof value === "string") {
                return value;
            }
            return value && typeof value.comment === "string" ? value.comment : "";
        }

        async function getComment(fileName) {
            const { comments } = await loadCommentsFile();
            return readComment(comments, fileName);
        }

        async function setComment(fileName, comment) {
            const { sha, comments } = await loadCommentsFile();
            const key = commentKey(fileName);
            const trimmedComment = comment.trim();
            delete comments[fileName];
            if (trimmedComment) {
                comments[key] = trimmedComment;
            } else {
                delete comments[key];
            }
            await saveCommentsFile(comments, sha);
        }

        async function moveComment(oldFileName, newFileName) {
            const { sha, comments } = await loadCommentsFile();
            const oldKey = commentKey(oldFileName);
            const newKey = commentKey(newFileName);
            const value = comments[oldKey] ?? comments[oldFileName];
            delete comments[oldKey];
            delete comments[oldFileName];
            if (value) {
                comments[newKey] = value;
            }
            await saveCommentsFile(comments, sha);
        }

        async function deleteComment(fileName) {
            const { sha, comments } = await loadCommentsFile();
            delete comments[commentKey(fileName)];
            delete comments[fileName];
            await saveCommentsFile(comments, sha);
        }

        async function listImages() {
            const response = await fetch(contentUrl(), {
                headers: githubHeaders()
            });
            const text = await response.text();
            const body = text ? JSON.parse(text) : null;
            if (response.status === 404) {
                return [];
            }
            if (!response.ok) {
                throw new Error(`GitHub API error ${response.status}: ${body && body.message ? body.message : text}`);
            }
            return Array.isArray(body)
                ? body.filter((item) => item.type === "file").sort((a, b) => a.name.localeCompare(b.name, "ja"))
                : [];
        }

        function renderImageList(records) {
            imageList.textContent = "";
            if (!records.length) {
                const empty = document.createElement("p");
                empty.className = "resultMeta";

                row.className = "imageListRow";

                const name = document.createElement("p");
                name.className = "imageListName";
                const numberText = record.numbers && record.numbers.length ? ` / ${record.numbers.join(", ")}` : "";
                name.textContent = `${record.name} (${record.images.length}枚)${numberText}`;

                const selectButton = document.createElement("button");
                selectButton.className = "secondary";
                selectButton.type = "button";
                selectButton.textContent = "選択";
                selectButton.addEventListener("click", () => selectListedRecord(record));

                const removeButton = document.createElement("button");
                removeButton.className = "danger";
                removeButton.type = "button";
                removeButton.textContent = "削除";
                removeButton.addEventListener("click", () => deleteListedRecord(record));

                row.appendChild(name);
                row.appendChild(selectButton);

        async function refreshImageList() {
            setStatus("登録画像一覧を取得中...");
            const { catalog } = await loadCatalogFile();
            const records = catalog.records
                .filter((record) => record.images.length)
                .sort((a, b) => a.name.localeCompare(b.name, "ja"));
            renderImageList(records);
            setStatus(`登録画像一覧を表示しました: ${records.length}件`);
        }

        async function selectListedRecord(record) {
            try {

                const first = record.images[0];

                try {
                    image = await getImage(first.file);
                } catch (error) {

                }

                    await refreshImageList();
                    return;
                }
                image = {

        async function deleteListedRecord(record) {
            if (!confirm(`${record.name} と登録画像 ${record.images.length}枚を削除しますか？`)) {
                return;
            }

            try {
                ensureGitHubSession();
                setBusy(true);
                const { sha, catalog } = await loadCatalogFile();
                const target = catalog.records.find((item) => item.name.toLowerCase() === record.name.toLowerCase());
                if (!target) {
                    setStatus("削除対象が見つかりませんでした。");
                    await refreshImageList();
                    return;
                }
                setStatus(`削除中: ${target.name}`);
                for (const image of target.images) {
                    const imageFile = await getImage(image.file);
                    if (imageFile) {
                        await deleteImage(imageFile.name, imageFile.sha);
                    }
                    await deleteComment(image.file);
                }
                catalog.records = catalog.records.filter((item) => item !== target);
                await saveCatalogFile(catalog, sha);
                if (currentImage && currentImage.recordName && currentImage.recordName.toLowerCase() === target.name.toLowerCase()) {
                    clearPreview();
                }
                await refreshImageList();
                setStatus(`削除しました: ${target.name}`);
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        }

        async function getImage(fileName) {
            const response = await fetch(contentUrl(fileName), {
                headers: githubHeaders()
            });
            if (response.status === 404) {
                return null;
            }
            const body = await response.json();
            if (!response.ok) {
                throw new Error(`GitHub API error ${response.status}: ${body.message || "request failed"}`);
            }
            let bytes = null;
            if (typeof body.content === "string" && body.content) {
                const binary = atob(body.content.replace(/\n/g, ""));
                bytes = new Uint8Array(binary.length);
                for (let index = 0; index < binary.length; index += 1) {
                    bytes[index] = binary.charCodeAt(index);
                }
            } else if (body.download_url) {
                const imageResponse = await fetch(body.download_url, {
                    headers: {
                        "Authorization": `Bearer ${session.token}`
                    }
                });
                if (imageResponse.ok) {
                    bytes = new Uint8Array(await imageResponse.arrayBuffer());
                }
            }
            const comment = await getComment(fileName);
            return {
                name: fileName,
                sha: body.sha,
                bytes,
                mimeType: contentTypeForName(fileName),
                downloadUrl: body.download_url,
                comment
            };
        }

        async function getImageFromDownloadUrl(file) {
            if (!file.download_url) {
                return null;
            }
            const response = await fetch(file.download_url, {
                headers: {
                    "Authorization": `Bearer ${session.token}`
                }
            });
            if (!response.ok) {
                return {
                    name: file.name,
                    sha: file.sha,
                    bytes: null,
                    mimeType: contentTypeForName(file.name),
                    downloadUrl: file.download_url,
                    comment: await getComment(file.name)
                };
            }
            return {
                name: file.name,
                sha: file.sha,
                bytes: new Uint8Array(await response.arrayBuffer()),
                mimeType: response.headers.get("Content-Type") || contentTypeForName(file.name),
                downloadUrl: file.download_url,
                comment: await getComment(file.name)
            };
        }

        async function findImage(value) {
            const { catalog } = await loadCatalogFile();
            const record = findCatalogRecord(catalog, value);
            if (record && record.images.length) {
                const first = record.images[0];
                const image = await getImage(first.file);
                if (image) {
                    return {
                        ...image,
                        recordName: record.name,
                        numbers: record.numbers,
                        recordImages: record.images,
                        comment: first.comment || image.comment
                    };
                }
            }

            const candidates = modelCandidates(value);
            for (const candidate of candidates) {
                const image = await getImage(candidate);
                if (image) {
                    return attachCatalogToImage(image);
                }
            }

            const clean = normalizeBaseName(value);
            if (!clean || /\.[a-z0-9]+$/i.test(clean)) {
                return null;
            }

            const files = await listImages();
            const matched = files.find((file) => {
                const baseName = file.name.replace(/\.[^.]+$/, "");
                return baseName.toLowerCase() === clean.toLowerCase();
            });
            return matched ? attachCatalogToImage(await getImage(matched.name)) : null;
        }

        function contentTypeForName(fileName) {
            const extension = fileName.split(".").pop().toLowerCase();
            if (extension === "png") {
                return "image/png";
            }
            if (extension === "webp") {
                return "image/webp";
            }
            if (extension === "gif") {
                return "image/gif";
            }
            return "image/jpeg";
        }

        function bytesToBase64(bytes) {
            let binary = "";
            const chunkSize = 8192;
            for (let offset = 0; offset < bytes.length; offset += chunkSize) {
                const chunk = bytes.slice(offset, offset + chunkSize);
                binary += String.fromCharCode(...chunk);
            }
            return btoa(binary);
        }

        async function putImage(fileName, bytes, sha = null, message = `Upload ${fileName}`) {
            const payload = {
                message,
                branch: session.branch,
                content: bytesToBase64(bytes)
            };
            if (sha) {
                payload.sha = sha;
            }
            await githubRequest(contentUrl(fileName, false), {
                method: "PUT",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
        }

        async function deleteImage(fileName, sha, message = `Delete ${fileName}`) {
            await githubRequest(contentUrl(fileName, false), {
                method: "DELETE",
                headers: {
                    ...githubHeaders(),
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message,
                    branch: session.branch,
                    sha
                })
            });
        }

        async function uploadImage(fileName, bytes) {
            const existing = await getImage(fileName);
            await putImage(fileName, bytes, existing ? existing.sha : null, `Upload ${fileName}`);
        }

        uploadButton.addEventListener("click", async () => {
            const recordName = modelInput.value.trim();
            const numberTokens = parseNumberTokens(numbersInput.value);
            const numbers = parseNumbers(numbersInput.value);
            const files = Array.from(photoInput.files);
            if (!recordName) {
                setStatus("登録名を入力してください。");
                return;
            }
            if (!currentImage && !files.length) {
                setStatus("画像ファイルを選択してください。");
                return;
            }
            if (numberTokens.some((number) => !/^\d{4}$/.test(number))) {
                setStatus("登録番号は4桁数字で入力してください。");
                return;
            }

            try {
                ensureGitHubSession();
                setBusy(true);
                const { sha, catalog } = await loadCatalogFile();
                const comment = commentInput.value.trim();
                let record = null;
                let previewFileName = "";

                if (currentImage) {
                    const recordIndex = findRecordIndexByImage(catalog, currentImage.name);
                    if (recordIndex >= 0) {
                        record = catalog.records[recordIndex];
                    } else {
                        record = {
                            name: currentImage.recordName || recordName,
                            numbers: Array.isArray(currentImage.numbers) ? currentImage.numbers : [],
                            images: [{ file: currentImage.name, comment: currentImage.comment || "" }]
                        };
                        catalog.records.push(record);
                    }

                    const duplicateRecord = findOtherRecordByName(catalog, recordName, record);
                    if (duplicateRecord) {
                        setStatus("同じ登録名が既にあります。別の登録名を入力してください。");
                        return;
                    }

                    record.name = recordName;
                    record.numbers = numbers;
                    if (Array.isArray(currentImage.recordImages) && currentImage.recordImages.length) {
                        const existingByFile = new Map(record.images.map((image) => [image.file, image]));
                        record.images = currentImage.recordImages.slice(0, 6)
                            .filter((image) => image && image.file)
                            .map((image) => {
                                const existing = existingByFile.get(image.file);
                                return {
                                    file: image.file,
                                    comment: existing && typeof existing.comment === "string"
                                        ? existing.comment
                                        : (typeof image.comment === "string" ? image.comment : "")
                                };
                            });
                    }

                    let imageEntry = record.images.find((image) => image.file === currentImage.name);
                    if (!imageEntry) {
                        imageEntry = { file: currentImage.name, comment: "" };
                        record.images.unshift(imageEntry);
                    }
                    imageEntry.comment = comment;
                    await setComment(imageEntry.file, comment);
                    previewFileName = imageEntry.file;

                    if (files.length) {
                        const firstFile = files[0];
                        const replacementBytes = new Uint8Array(await firstFile.arrayBuffer());
                        await putImage(imageEntry.file, replacementBytes, currentImage.sha, `Update ${imageEntry.file}`);
                    }

                    const appendFiles = files.slice(1);
                    const remaining = 6 - record.images.length;
                    if (appendFiles.length > remaining) {
                        setStatus(`最大6枚までです。追加画像は先頭${Math.max(remaining, 0)}枚だけ保存します。`);
                    }
                    for (const file of appendFiles.slice(0, Math.max(remaining, 0))) {
                        const fileName = nextCatalogFileName(record.name, record.images, file.name);
                        if (!fileName) {
                            break;
                        }
                        const bytes = new Uint8Array(await file.arrayBuffer());
                        await uploadImage(fileName, bytes);
                        await setComment(fileName, comment);
                        record.images.push({ file: fileName, comment });
                    }
                } else {
                    record = findRecordByName(catalog, recordName);
                    if (!record) {
                        record = { name: recordName, numbers: [], images: [] };
                        catalog.records.push(record);
                    }
                    record.numbers = numbers.length ? numbers : record.numbers;

                    const remaining = 6 - record.images.length;
                    if (remaining <= 0) {
                        setStatus("この登録名には既に6枚の画像が登録されています。");
                        return;
                    }
                    if (files.length > remaining) {
                        setStatus(`最大6枚までです。先頭${remaining}枚だけ保存します。`);
                    } else {
                        setStatus(`保存中: ${recordName}`);
                    }
                    for (const file of files.slice(0, remaining)) {
                        const fileName = nextCatalogFileName(record.name, record.images, file.name);
                        if (!fileName) {
                            break;
                        }
                        const bytes = new Uint8Array(await file.arrayBuffer());
                        await uploadImage(fileName, bytes);
                        await setComment(fileName, comment);
                        record.images.push({ file: fileName, comment });
                        if (!previewFileName) {
                            previewFileName = fileName;
                        }
                    }
                }

                await saveCatalogFile(catalog, sha);
                const image = previewFileName ? await getImage(previewFileName) : null;
                if (image) {
                    showPreview(await attachCatalogToImage(image));
                }
                await refreshImageList();
                photoInput.value = "";
                setStatus(`保存しました: ${record.name} (${record.images.length}/6枚)`);
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });

        renameButton.addEventListener("click", async () => {
            if (!currentImage) {
                return;
            }

            const nextValue = prompt("変更後の画像ファイル名を入力してください。", currentImage.name.replace(/\.[^.]+$/, ""));
            if (nextValue === null) {
                return;
            }
            const extension = currentImage.name.match(/\.[a-z0-9]+$/i)?.[0] || ".jpg";
            const nextName = normalizeFileName(nextValue, extension);
            if (!nextName) {
                setStatus("変更後の画像ファイル名を入力してください。");
                return;
            }
            if (nextName === currentImage.name) {
                setStatus("同じ名前です。");
                return;
            }

            try {
                ensureGitHubSession();
                setBusy(true);
                setStatus(`名前変更中: images/${currentImage.name} -> images/${nextName}`);
                const existing = await getImage(nextName);
                if (existing && !confirm(`images/${nextName} は既に存在します。上書きしますか？`)) {
                    setStatus("名前変更をキャンセルしました。");
                    return;
                }
                await putImage(nextName, currentImage.bytes, existing ? existing.sha : null, `Rename ${currentImage.name} to ${nextName}`);
                await deleteImage(currentImage.name, currentImage.sha, `Remove ${currentImage.name} after rename`);
                await moveComment(currentImage.name, nextName);
                const { sha, catalog } = await loadCatalogFile();
                const record = findRecordByImage(catalog, currentImage.name);
                if (record) {
                    const imageEntry = record.images.find((image) => image.file === currentImage.name);
                    if (imageEntry) {
                        imageEntry.file = nextName;
                        await saveCatalogFile(catalog, sha);
                    }
                }
                const renamed = await getImage(nextName);
                if (renamed) {
                    modelInput.value = nextName.replace(/\.[^.]+$/, "");
                    showPreview(await attachCatalogToImage(renamed));
                }
                await refreshImageList();
                setStatus(`名前変更しました: images/${nextName}`);
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });

        deleteButton.addEventListener("click", async () => {
            if (!currentImage) {
                return;
            }
            if (!confirm(`images/${currentImage.name} を削除しますか？`)) {
                return;
            }

            try {
                ensureGitHubSession();
                setBusy(true);
                setStatus(`削除中: images/${currentImage.name}`);
                await deleteImage(currentImage.name, currentImage.sha);
                await deleteComment(currentImage.name);
                const { sha, catalog } = await loadCatalogFile();
                const record = findRecordByImage(catalog, currentImage.name);
                if (record) {
                    record.images = record.images.filter((image) => image.file !== currentImage.name);
                    catalog.records = catalog.records.filter((item) => item.images.length > 0 || item.name !== record.name);
                    await saveCatalogFile(catalog, sha);
                }
                clearPreview();
                await refreshImageList();
                setStatus("画像データを削除しました。");
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });

        refreshListButton.addEventListener("click", async () => {
            try {
                ensureGitHubSession();
                setBusy(true);
                await refreshImageList();
            } catch (error) {
                setStatus(error.message);
            } finally {
                setBusy(false);
            }
        });

        lightboxClose.addEventListener("click", closeLightbox);
        lightbox.addEventListener("click", (event) => {
            if (event.target === lightbox) {
                closeLightbox();
            }
        });
        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
